services:
  # =========================================================================
  # 1. SENTINELX BACKEND (Node.js + Frontend Monolith)
  # =Key Features: Serves UI, API, Sockets, and connects to Postgres & AI.
  # =========================================================================
  - type: web
    name: sentinelx-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sentinelx-db
          property: connectionString
      - key: PYTHON_URL
        value: http://sentinelx-ai:10000
      # Social Auth & Email (User must fill these in Render Dashboard for full functionality)
      - key: GOOGLE_CLIENT_ID
        value: "621393f52357ebe89dac0ba2333675fc"
      - key: GOOGLE_CLIENT_SECRET
        value: "cd43d1ef0878134c54734178df301d38"
      - key: EMAIL_USER
        value: "alertsentinelx@gmail.com"
      - key: EMAIL_PASS
        value: "imay xfcs tuvp domb"

  # =========================================================================
  # 2. SENTINELX AI ENGINE (Python Flask)
  # =Key Features: Handles Heuristic Log Analysis & Pulse Simulation.
  # =========================================================================
  - type: web
    name: sentinelx-ai
    env: python
    plan: free
    rootDir: backend/python_service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  # =========================================================================
  # 3. SENTINELX DATABASE (PostgreSQL)
  # =Note: Render Free Postgres expires after 90 days.
  # =========================================================================
  - name: sentinelx-db
    plan: free
    region: oregon # Match regions for internal networking
